<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gulfshine Travel</title>
  <meta name="description" content="Continue to the Gulfshine Travel website." />
  <meta http-equiv="refresh" content="0; url=redesign/index.html" />
  <link rel="canonical" href="redesign/index.html" />
  <style>
    :root {
      color-scheme: light;
      --green: #062f2d;
      --gold: #c9972b;
      --cream: #f7f2e8;
      --muted: rgba(247, 242, 232, 0.74);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      color: var(--cream);
      background:
        linear-gradient(180deg, rgba(6, 47, 45, 0.86), rgba(4, 33, 31, 0.96)),
        var(--green);
    }

    main {
      max-width: 560px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: clamp(2.2rem, 7vw, 4.2rem);
      line-height: 1;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 26px;
      border: 1px solid var(--gold);
      color: var(--green);
      background: var(--gold);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
    }

    a:hover {
      background: #d8a93f;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gulfshine Travel</h1>
    <p>You are being sent to the main website. If it does not open automatically, use the button below.</p>
    <a href="redesign/index.html">Enter Website</a>
  </main>
</body>
</html>
